name: Deploy FocusBoard

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: snaripp/focusboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set up SSH tunnel and run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -fN -L 5433:focusboard-db.c9kqck6ckcyo.ap-south-1.rds.amazonaws.com:5432 ubuntu@${{ secrets.EC2_HOST }}
          sleep 5
          TUNNEL_DB_URL=$(echo "$DATABASE_URL" | sed "s/focusboard-db.c9kqck6ckcyo.ap-south-1.rds.amazonaws.com:5432/localhost:5433/")
          DATABASE_URL="$TUNNEL_DB_URL" npx prisma migrate deploy

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} "
            sudo docker pull snaripp/focusboard:latest &&
            sudo docker stop focusboard || true &&
            sudo docker rm focusboard || true &&
            sudo docker run -d --name focusboard --restart always -p 3000:3000 -e DATABASE_URL='${{ secrets.DATABASE_URL }}' snaripp/focusboard:latest
          "